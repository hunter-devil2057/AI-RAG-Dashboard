<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI RAG Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .dark .glass { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); }
        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .dark .chat-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#6366f1',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-slate-900 dark:text-gray-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [isDark, setIsDark] = useState(true);
            const [chatMessages, setChatMessages] = useState([]);
            const [query, setQuery] = useState("");
            const [sessionId] = useState("session_" + Math.random().toString(36).substr(2, 9));
            const [loading, setLoading] = useState(false);
            const [uploading, setUploading] = useState(false);
            const [strategy, setStrategy] = useState("recursive");
            const [file, setFile] = useState(null);
            
            const chatEndRef = useRef(null);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', isDark);
            }, [isDark]);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [chatMessages]);

            const handleUpload = async (e) => {
                e.preventDefault();
                if (!file) return;
                setUploading(true);
                const formData = new FormData();
                formData.append('file', file);
                formData.append('strategy', strategy);

                try {
                    const res = await fetch('/api/v1/ingestion/upload', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();
                    alert(`Success: ${data.filename} indexed building ${data.chunks_processed} chunks!`);
                } catch (err) {
                    alert('Upload failed: ' + err.message);
                } finally {
                    setUploading(false);
                    setFile(null);
                }
            };

            const handleChat = async (e) => {
                e.preventDefault();
                if (!query.trim()) return;

                const userMsg = { role: 'user', content: query };
                setChatMessages(prev => [...prev, userMsg]);
                setQuery("");
                setLoading(true);

                try {
                    const res = await fetch('/api/v1/chat/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query: userMsg.content, session_id: sessionId })
                    });
                    const data = await res.json();
                    setChatMessages(prev => [...prev, { role: 'assistant', content: data.response }]);
                } catch (err) {
                    setChatMessages(prev => [...prev, { role: 'assistant', content: "Error: " + err.message }]);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-7xl mx-auto px-4 py-8">
                    {/* Header */}
                    <header className="flex justify-between items-center mb-12 animate-fade-in">
                        <div>
                            <h1 className="text-3xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">
                                AI RAG Dashboard
                            </h1>
                            <p className="text-sm text-gray-500 dark:text-gray-400 mt-1">Multi-Strategy Ingestion & Conversational Agent</p>
                        </div>
                        <button 
                            onClick={() => setIsDark(!isDark)}
                            className="p-3 rounded-2xl glass hover:bg-gray-100 dark:hover:bg-slate-800 transition-all shadow-sm"
                        >
                            {isDark ? '☀️ Light' : '🌙 Dark'}
                        </button>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Left Side: Ingestion */}
                        <div className="lg:col-span-4 space-y-6">
                            <div className="glass rounded-3xl p-6 shadow-xl border border-white/20">
                                <h2 className="text-xl font-semibold mb-6 flex items-center gap-2">
                                    <span className="p-2 bg-blue-100 dark:bg-blue-900/30 rounded-lg text-primary">📥</span>
                                    Document Ingestion
                                </h2>
                                <form onSubmit={handleUpload} className="space-y-4">
                                    <div className="border-2 border-dashed border-gray-300 dark:border-slate-700 rounded-2xl p-8 text-center hover:border-primary transition-colors cursor-pointer relative">
                                        <input 
                                            type="file" 
                                            className="absolute inset-0 opacity-0 cursor-pointer"
                                            onChange={(e) => setFile(e.target.files[0])}
                                            accept=".pdf,.txt"
                                        />
                                        <div className="text-sm">
                                            {file ? (
                                                <span className="text-primary font-medium">{file.name}</span>
                                            ) : (
                                                <span className="text-gray-400">Drop PDF/TXT or click to browse</span>
                                            )}
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-2">
                                        <label className="text-xs font-semibold text-gray-400 uppercase tracking-wider">Strategy</label>
                                        <select 
                                            value={strategy}
                                            onChange={(e) => setStrategy(e.target.value)}
                                            className="w-full bg-gray-100 dark:bg-slate-800 rounded-xl p-3 outline-none focus:ring-2 ring-primary/50 transition-all"
                                        >
                                            <option value="recursive">Recursive Character (Smart)</option>
                                            <option value="sliding_window">Fixed Overlap (Strict)</option>
                                        </select>
                                    </div>

                                    <button 
                                        disabled={!file || uploading}
                                        className="w-full bg-primary hover:bg-blue-600 disabled:bg-gray-400 text-white font-semibold py-4 rounded-xl transition-all shadow-lg active:scale-95"
                                    >
                                        {uploading ? 'Processing...' : 'Upload & Process'}
                                    </button>
                                </form>
                            </div>

                            <div className="glass rounded-3xl p-6 shadow-lg border border-white/20">
                                <h3 className="text-sm font-semibold text-gray-400 uppercase mb-4">Core Stats</h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-gray-100/50 dark:bg-slate-800/50 p-4 rounded-2xl">
                                        <p className="text-xs text-gray-500">FastAPI</p>
                                        <p className="font-bold text-green-500">Online</p>
                                    </div>
                                    <div className="bg-gray-100/50 dark:bg-slate-800/50 p-4 rounded-2xl">
                                        <p className="text-xs text-gray-500">Vector DB</p>
                                        <p className="font-bold text-blue-500">Synced</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Right Side: Chat & Booking */}
                        <div className="lg:col-span-8 space-y-6 flex flex-col min-h-[600px]">
                            <div className="glass rounded-3xl shadow-2xl flex-1 flex flex-col overflow-hidden border border-white/20">
                                {/* Chat Header */}
                                <div className="p-4 border-b border-gray-200 dark:border-slate-800 flex items-center justify-between">
                                    <h2 className="font-semibold flex items-center gap-2">
                                        <span className="text-secondary">💬</span> AI Conversational Agent
                                    </h2>
                                    <span className="text-[10px] bg-slate-200 dark:bg-slate-700 px-2 py-1 rounded-full uppercase tracking-widest text-gray-500">
                                        Session: {sessionId.slice(-5)}
                                    </span>
                                </div>

                                {/* Chat Body */}
                                <div className="flex-1 overflow-y-auto p-6 space-y-4 chat-scroll">
                                    {chatMessages.length === 0 && (
                                        <div className="text-center py-20 text-gray-400">
                                            <p className="text-lg">Ask me about your documents or schedule an interview.</p>
                                        </div>
                                    )}
                                    {chatMessages.map((msg, i) => (
                                        <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} animate-scale-up`}>
                                            <div className={`max-w-[80%] p-4 rounded-2xl ${
                                                msg.role === 'user' 
                                                ? 'bg-primary text-white rounded-tr-none' 
                                                : 'bg-gray-100 dark:bg-slate-800 rounded-tl-none shadow-sm'
                                            }`}>
                                                {msg.content}
                                            </div>
                                        </div>
                                    ))}
                                    {loading && (
                                        <div className="flex justify-start animate-fade-in">
                                            <div className="bg-gray-100 dark:bg-slate-800 p-4 rounded-2xl rounded-tl-none">
                                                <div className="flex gap-1">
                                                    <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                                                    <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce delay-75"></div>
                                                    <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce delay-150"></div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    <div ref={chatEndRef} />
                                </div>

                                {/* Chat Input */}
                                <div className="p-4 bg-white/50 dark:bg-slate-900/50">
                                    <form onSubmit={handleChat} className="relative">
                                        <input 
                                            type="text" 
                                            value={query}
                                            onChange={(e) => setQuery(e.target.value)}
                                            placeholder="Ask anything..."
                                            className="w-full bg-gray-100 dark:bg-slate-800 rounded-2xl py-4 pl-6 pr-12 outline-none focus:ring-2 ring-primary/50 transition-all"
                                        />
                                        <button 
                                            disabled={loading}
                                            className="absolute right-2 top-2 p-2 bg-primary text-white rounded-xl hover:bg-blue-600 active:scale-90 transition-all"
                                        >
                                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                                            </svg>
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
